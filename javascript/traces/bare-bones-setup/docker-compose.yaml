services:
  jaeger:
    image: jaegertracing/all-in-one:latest@sha256:ab6f1a1f0fb49ea08bcd19f6b84f6081d0d44b364b6de148e1798eb5816bacac
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # Jaeger grpc (optional)
      # Remove 4317 port from jaeger to avoid conflict
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      COLLECTOR_OTLP_GRPC_PORT: 4317

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest@sha256:4935caa35e9a4cb387e35732e8fb22b2b5759af8d12e7043357f03837f6e8df5
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol/config.yaml
    command: ["--config", "/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"  # only otel-collector uses 4317 on host
      - "4318:4318"
    depends_on:
      - jaeger